# ============================================================
# LOGGING CONFIGURATION
# ============================================================

# Console logging (required for Render to capture logs)
logging.level.root=INFO
logging.level.com.saiteja.portfolio_backend=DEBUG
logging.level.com.saiteja.portfolio_backend.service=DEBUG
logging.level.com.saiteja.portfolio_backend.controller=DEBUG
logging.level.com.saiteja.portfolio_backend.security=DEBUG

# Third-party loggers
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.mongodb.driver=WARN

# Console pattern (Render captures stdout)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] %logger{36} - %msg%n

# Render file logging (optional, logs to file as well)
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7

# Async logging
logging.async.mode=buffer
logging.async.queue-size=512

